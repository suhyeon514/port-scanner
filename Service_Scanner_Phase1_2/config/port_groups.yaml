# port_groups.yaml
version: 1

tcp_groups:
  # 웹/웹관리 콘솔에서 자주 쓰는 포트
  # 80, 443: HTTP/HTTPS 표준 포트
  # 8080, 8443, 8000: 웹 서버 대체 포트
  # 3000, 5000, 7080: 개발 환경 및 애플리케이션 서버
  # 기타: 관리 콘솔, 프록시 등
  web:
    ports: [80, 81, 443, 3000, 3001, 4443, 5000, 5001, 7080, 7443, 8080, 8081, 8443, 8000, 8888, 9000, 9443, 10000]

  # 데이터베이스/검색/캐시
  # 3306: MySQL
  # 5432: PostgreSQL
  # 1433: MSSQL
  # 27017: MongoDB
  # 6379: Redis
  # 9200: Elasticsearch
  # 11211: Memcached
  db:
    ports: [1433, 1521, 2049, 2375, 2376, 27017, 28017, 3306, 5432, 5984, 6379, 7000, 7001, 9200, 9300, 11211]

  # 원격 접속/관리(외부 노출 시 고위험)
  # 21, 23: FTP, Telnet (구식)
  # 22: SSH
  # 3389: RDP (Windows)
  # 5900: VNC
  remote_admin:
    ports: [21, 22, 23, 3389, 5900, 5985, 5986]

  # 메일
  # 25, 587: SMTP (발송)
  # 110, 995: POP3
  # 143, 993: IMAP
  mail:
    ports: [25, 110, 143, 465, 587, 993, 995]

  # 내부 인프라/파일/백업/스토리지(내부에서 흔함)
  # 53: DNS
  # 69: TFTP
  # 111: RPC
  # 135: MS RPC
  # 137, 138, 139: NetBIOS
  # 445: SMB (파일 공유)
  # 389: LDAP (direcroty 에 중복 있음)
  # 123: NTP (시간 동기화)
  # 161, 162: SNMP (모니터링)
  infra:
    ports: [53, 69, 111, 123, 135, 137, 138, 139, 161, 162, 389, 445, 514, 873, 2049, 3260, 4444, 5353]

  # 디렉토리/인증(내부 역할 파악에 중요)
  # 88: Kerberos
  # 389, 636: LDAP/LDAPS  (infra 에 중복 있음)
  # 3268, 3269: Active Directory
  directory:
    ports: [88, 389, 636, 3268, 3269]

  # 모니터링/메트릭(내부에서 흔함)
  # 9090, 9093: Prometheus
  # 9100: Node Exporter
  monitoring:
    ports: [9090, 9093, 9100, 20000, 30000]

udp_groups:
  # 내부 코어 UDP
  # 53: DNS
  # 67, 68: DHCP
  # 123: NTP
  core_udp_internal:
    ports: [53, 67, 68, 69, 123, 161, 162, 500, 514, 520, 1900, 4500]

  # VPN/터널 계열 UDP(외부/내부 모두 의미 있는 경우가 많음)
  # 500, 4500: IPSec
  # 1194: OpenVPN
  # 51820: WireGuard
  vpn_udp:
    ports: [500, 4500, 1701, 1194, 51820]

tcp_sets:
  tcp_1_1024:
    mode: "range"
    from: 1
    to: 1024